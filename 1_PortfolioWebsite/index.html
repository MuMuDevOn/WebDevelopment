<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <!-- Desktop Navigation -->
    <nav id="desktop-nav">
        <div class="logo">Mutsa</div>
        <div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hamburger Navigation -->
    <nav id="hamburger-nav">
        <div class="logo">Mutsa</div>
        <div class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-links">
                <ul>
                    <li><a href="#about" onclick="toggleMenu()">About</a></li>

    <!-- Profile Section -->
    <section id="profile">
        <div class="section_pic-container">
            <img src="./assets/Mutsa_ProfilePic1.png" alt="Mutsa profile picture">
        </div>
        <div class="section_text-container">
            <p class="section_text_p1">Hello, I'm</p>
            <h1 class="title">Mutsa A.T Kembo</h1>
            <p class="section_text_p2">Embedded Systems and Network Engineer</p>
            
            <div class="btn-container">

                <button class="btn btn-color-1" onclick="location.href='#contact'">Contact Info</button>
            </div>

            <div id="socials-container">
                <img src="./assets/linkedin.png" 
                     alt="My Linkedin profile"
                     class="icon" 
                     onclick="location.href='https://www.linkedin.com/in/mutsa-kembo-883699330/'"
                />
                <img src="./assets/github.png" 
                     alt="My Github profile"
                     class="icon" 
                     onclick="location.href='https://github.com/MuMuDevOn/'"
                />
            </div>
        </div>

    <script src="script.js"></script>
